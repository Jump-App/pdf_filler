name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -n 1)"
          expected_tag="v${crate_version}"

          if [[ -z "${crate_version}" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${crate_version}" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # musl targets produce fully static binaries (crt-static is the
          # Rust default for *-musl) that run on both glibc and musl
          # (Alpine) systems.
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends musl-tools

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: bash
        run: cp target/${{ matrix.target }}/release/pdf_filler pdf_filler-${{ matrix.target }}

      - name: Verify musl binary is fully static
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          if ldd "pdf_filler-${{ matrix.target }}" 2>&1 | grep -qE "statically linked|not a dynamic executable"; then
            echo "Binary is static"
          else
            echo "Binary is NOT static:" >&2
            ldd "pdf_filler-${{ matrix.target }}" >&2
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf_filler-${{ matrix.target }}
          path: pdf_filler-${{ matrix.target }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pdf_filler-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        working-directory: release-assets
        run: sha256sum pdf_filler-* > checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/pdf_filler-*
            release-assets/checksums.txt
